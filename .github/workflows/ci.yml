name: CI

# Runs the backend test suite on every push/PR to main. The suite is mostly
# hermetic (pure engines + faked DB); conftest.py auto-skips the few modules that
# need DATABASE_URL / OPENAI_API_KEY, so this job needs no secrets or services.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"   # matches the Dockerfile (python:3.11-slim)
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest
      - name: Run tests
        run: pytest -q
