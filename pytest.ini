[pytest]
# The canonical suite lives in tests/. Scoping collection here keeps `pytest`
# (bare, as CI runs it) from picking up the ad-hoc async integration scripts at
# the repo root and under tools/ (test_phd_intelligence.py, tools/test_*.py) —
# those are __main__-runnable scripts that need a real .env + API keys and are
# not pytest-structured, so bare collection reported them as failures.
testpaths = tests
